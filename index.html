index.html<!DOCTYPE html>  <html>  
<head>  
<title>Sonu Sticker Store</title>  <meta name="viewport" content="width=device-width, initial-scale=1">  <style>  
  
body{  
font-family:Arial;  
margin:0;  
background:#f5f5f5;  
}  
  
header{  
background:#000;  
color:white;  
padding:15px;  
text-align:center;  
font-size:22px;  
}  
  
.products{  
display:grid;  
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));  
gap:20px;  
padding:20px;  
}  
  
.product{  
background:white;  
padding:15px;  
border-radius:10px;  
text-align:center;  
box-shadow:0 5px 10px rgba(0,0,0,0.1);  
}  
  
.product img{  
width:100%;  
border-radius:10px;  
}  
  
.price{  
color:#ff2e63;  
font-size:18px;  
margin:10px 0;  
}  
  
button{  
background:#ff2e63;  
color:white;  
border:none;  
padding:10px;  
border-radius:5px;  
cursor:pointer;  
}  
  
</style>  </head>  <body>  <header>  
🔥 Sonu Sticker Store  
</header>  <div class="products">  <div class="product">  
<img src="https://picsum.photos/200?1">  
<h3>Cute Panda Sticker</h3>  
<div class="price">₹49</div>  
<button onclick="order('Cute Panda Sticker')">Order</button>  
</div>  <div class="product">  
<img src="https://picsum.photos/200?2">  
<h3>Anime Ninja Sticker</h3>  
<div class="price">₹59</div>  
<button onclick="order('Anime Ninja Sticker')">Order</button>  
</div>  <div class="product">  
<img src="https://picsum.photos/200?3">  
<h3>Gaming Sticker</h3>  
<div class="price">₹69</div>  
<button onclick="order('Gaming Sticker')">Order</button>  
</div>  <div class="product">  
<img src="https://picsum.photos/200?4">  
<h3>Cat Meme Sticker</h3>  
<div class="price">₹39</div>  
<button onclick="order('Cat Meme Sticker')">Order</button>  
</div>  </div>  <script>  
  
function order(product){  
  
let phone="919263608670"  
  
let message="Hello I want to buy "+product  
  
let url="https://wa.me/"+phone+"?text="+encodeURIComponent(message)  
  
window.open(url)  
  
}  
  
</script>  </body>  
</html>
